services:
  product-service:
    build: ./product_service
    ports:
      - "8001:8000"
    networks:
      - service-net

  order-service:
    build: ./order_service
    ports:
      - "8002:8000"
    environment:
      PRODUCT_SERVICE_URL: http://product-service:8000
    depends_on:
      - product-service
    networks:
      - service-net
  db:
    image: postgres:latest
    ports: 
    - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d orders"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: orders
    volumes:
      - order_db:/var/lib/postgresql/data
    networks:
      - service-net

    
networks:
  service-net:
    driver: bridge
    ipam: 
      config:
        - subnet: 172.28.10.0/24
volumes:
  order_db: 
